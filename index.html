<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusicNotes Mobile</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --text: #ffffff;
            --accent: #00a8ff; --danger: #ff4757; --success: #2ed573; --border: #222;
        }
        .light {
            --bg: #f8f9fa; --card: #ffffff; --text: #212529;
            --accent: #007bff; --danger: #dc3545; --success: #28a745; --border: #dee2e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; transition: 0.3s;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* HEADER MOBILE */
        header {
            background: var(--card); padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); sticky; top: 0; z-index: 100;
        }

        /* MENU LATERAL (DRAWER NO MOBILE) */
        #sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--card); z-index: 1000; transition: 0.3s;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5); border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        #sidebar.open { left: 0; }
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%;
            height: 100%; background: rgba(0,0,0,0.7); z-index: 999;
        }
        .overlay.active { display: block; }

        /* ÁREA DE CONTEÚDO */
        main { flex: 1; overflow-y: auto; padding: 15px; }

        .card { 
            background: var(--card); border-radius: 15px; padding: 15px; 
            margin-bottom: 15px; border: 1px solid var(--border);
        }

        input, textarea {
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--bg); color: var(--text);
            font-size: 16px; box-sizing: border-box;
        }
        textarea { height: 120px; font-family: monospace; }

        /* BOTÕES TOQUE-FÁCIL */
        button {
            padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer;
            font-weight: bold; font-size: 14px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-main { background: var(--accent); color: white; width: 100%; }
        .btn-wp { background: var(--success); color: white; flex: 1; }
        .btn-del { background: var(--danger); color: white; flex: 1; }
        .btn-icon { background: transparent; color: var(--text); font-size: 20px; }

        /* NOTAS */
        .note-card { border-left: 5px solid var(--accent); position: relative; }
        .note-title { font-size: 18px; font-weight: bold; color: var(--accent); margin-bottom: 5px; }
        .note-date { font-size: 11px; opacity: 0.5; margin-bottom: 10px; }
        .note-body { white-space: pre-wrap; font-size: 15px; line-height: 1.4; margin-bottom: 15px; }

        footer { text-align: center; padding: 20px; font-size: 12px; opacity: 0.5; }

        /* ESTILO LISTA DE PASTAS */
        .folder-link {
            padding: 15px; border-bottom: 1px solid var(--border);
            cursor: pointer; display: flex; justify-content: space-between;
        }
        .folder-link.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <aside id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
            <h3>Menu</h3>
            <input type="text" id="folderName" placeholder="Nome da pasta...">
            <button class="btn-main" onclick="addFolder()">+ Nova Pasta</button>
        </div>
        <div id="folderList" style="flex:1; overflow-y:auto;"></div>
        <div style="padding: 15px; gap: 10px; display: flex;">
            <button class="btn-main" onclick="exportBackup()" style="background: #555;">Backup</button>
        </div>
        <footer id="footerName">Desenvolvido por: [SEU NOME]</footer>
    </aside>

    <header>
        <button class="btn-icon" onclick="toggleMenu()">☰</button>
        <h2 id="folderTitle" style="margin:0; font-size: 18px;">MusicNotes</h2>
        <button class="btn-icon" onclick="toggleTheme()">🌓</button>
    </header>

    <main>
        <div id="editorArea" style="display: none;">
            <div class="card">
                <input type="text" id="songTitle" placeholder="Título da Música">
                <textarea id="songNotes" placeholder="Cifras ou letra..."></textarea>
                <button class="btn-main" onclick="saveNote()">Salvar Nota</button>
            </div>
            <input type="text" id="searchBar" placeholder="🔍 Buscar música..." oninput="renderNotes()">
        </div>

        <div id="emptyMsg" style="text-align:center; margin-top: 50px; opacity:0.5">
            <h3>Toque no menu ☰ <br>para criar ou abrir uma pasta.</h3>
        </div>

        <div id="notesContainer"></div>
    </main>

<script>
    let db = JSON.parse(localStorage.getItem('musicNotes_v3')) || {};
    let currentFolder = null;

    // INTERFACE
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function toggleTheme() { document.body.classList.toggle('light'); }

    // PASTAS
    function addFolder() {
        const input = document.getElementById('folderName');
        const name = input.value.trim();
        if(name && !db[name]) {
            db[name] = [];
            input.value = '';
            saveDB();
            renderFolders();
        }
    }

    function renderFolders() {
        const list = document.getElementById('folderList');
        list.innerHTML = '';
        Object.keys(db).forEach(f => {
            const div = document.createElement('div');
            div.className = `folder-link ${currentFolder === f ? 'active' : ''}`;
            div.innerHTML = `<span>📂 ${f}</span> <span>${db[f].length}</span>`;
            div.onclick = () => { selectFolder(f); toggleMenu(); };
            list.appendChild(div);
        });
    }

    function selectFolder(f) {
        currentFolder = f;
        document.getElementById('folderTitle').innerText = f;
        document.getElementById('editorArea').style.display = 'block';
        document.getElementById('emptyMsg').style.display = 'none';
        renderFolders();
        renderNotes();
    }

    // NOTAS
    function saveNote() {
        const title = document.getElementById('songTitle').value.trim();
        const body = document.getElementById('songNotes').value.trim();
        if(!title || !body) return alert("Preencha título e nota!");

        const note = {
            title, body, 
            date: new Date().toLocaleDateString('pt-BR') + ' ' + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
        };

        db[currentFolder].unshift(note);
        document.getElementById('songTitle').value = '';
        document.getElementById('songNotes').value = '';
        saveDB();
        renderNotes();
    }

    function renderNotes() {
        const container = document.getElementById('notesContainer');
        const search = document.getElementById('searchBar').value.toLowerCase();
        container.innerHTML = '';

        if(!currentFolder) return;

        db[currentFolder].forEach((note, index) => {
            if(note.title.toLowerCase().includes(search) || note.body.toLowerCase().includes(search)) {
                const card = document.createElement('div');
                card.className = 'card note-card';
                card.innerHTML = `
                    <div class="note-title">${note.title}</div>
                    <div class="note-date">🗓️ ${note.date}</div>
                    <div class="note-body">${escapeHTML(note.body)}</div>
                    <div style="display:flex; gap:10px">
                        <button class="btn-wp" onclick="share('${note.title}', '${note.body}')">WhatsApp</button>
                        <button class="btn-del" onclick="deleteNote(${index})">Excluir</button>
                    </div>
                `;
                container.appendChild(card);
            }
        });
    }

    function deleteNote(index) {
        if(confirm("Apagar música?")) {
            db[currentFolder].splice(index, 1);
            saveDB();
            renderNotes();
            renderFolders();
        }
    }

    // ÚTEIS
    function saveDB() { localStorage.setItem('musicNotes_v3', JSON.stringify(db)); }
    
    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    function share(t, b) {
        const text = `*${t}*\n\n${b}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function exportBackup() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'backup_musicas.json';
        a.click();
    }

    renderFolders();
</script>
</body>
</html>
